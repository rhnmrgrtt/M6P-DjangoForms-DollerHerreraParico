{% extends 'MyInventoryApp/base.html' %}

{% block title %}Sign Up{% endblock %}

{% block navbar %}{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="margin-top: 70px;">
    <div class="col-md-4">
        <div class="card shadow">

            <div class="card-header text-dark text-center" style="background-color: #f1f1f1;">
                <h4>Create New Account</h4>
            </div>

            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-dark">Sign Up</button>
                        <a href="{% url 'login' %}" class="btn btn-outline-dark">Back to Login</a>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>
{% endblock %}
