<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bottle Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4>Water Bottle Details</h4>
        </div>
        <div class="card-body">
            <p><strong>SKU:</strong> {{ bottle.SKU }}</p>
            <p><strong>Brand:</strong> {{ bottle.brand }}</p>
            <p><strong>Price:</strong> {{ bottle.price }}</p>
            <p><strong>Size:</strong> {{ bottle.size }}</p>
            <p><strong>Mouth Size:</strong> {{ bottle.mouth_size }}</p>
            <p><strong>Color:</strong> {{ bottle.color }}</p>
            <p><strong>Supplier:</strong> {{ bottle.supplied_by }}</p>
            <p><strong>Quantity:</strong> {{ bottle.current_quantity }}</p>
        </div>
        <div class="card-footer d-flex gap-2">
            <a href="{% url 'delete_bottle' pk=bottle.pk %}" class="btn btn-danger">Delete</a>
            <a href="{% url 'view_bottles' %}" class="btn btn-secondary">Back</a>
        </div>
    </div>
</div>
</body>
</html>
