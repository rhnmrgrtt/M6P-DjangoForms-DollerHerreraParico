{% extends 'MyInventoryApp/base.html' %}
{% load static %}

{% block title %}Manage Account{% endblock %}

{% block content %}
<div class="col-md-8 offset-md-2" style="margin-top: 70px;">

    <div class="card manage-card">

        <div class="card-header text-white text-center" style="background-color: #000;">
            <h5 class="mb-0 fw-bold">Manage Account</h5>
        </div>

        <div class="card-body text-center" style="padding: 35px;">

            <h4 class="mb-2 mt-0">
                Logged in as: "<strong>{{ account.username }}</strong>"
            </h4>

            <p class="text-muted mt-4 mb-2">
                Choose an action below.
            </p>

            <hr>

            <div class="mb-2">
                <a href="{% url 'change_password' pk=account.pk %}" class="btn btn-warning me-2">Change Password</a>
                <a href="{% url 'delete_account' pk=account.pk %}" class="btn btn-danger me-2">Delete Account</a>
                <a href="{% url 'view_supplier' %}" class="btn btn-secondary">Back</a>
            </div>

        </div>
    </div>

</div>
{% endblock %}
