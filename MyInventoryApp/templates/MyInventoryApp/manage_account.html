<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Account</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-dark text-white text-center">
                    <h4>Manage Account</h4>
                </div>
                <div class="card-body text-center">
                    <p class="fs-5"><strong>Username:</strong> {{ account.username }}</p>
                    <div class="d-grid gap-2 mt-3">
                        <a href="{% url 'change_password' pk=account.pk %}" class="btn btn-warning">Change Password</a>
                        <a href="{% url 'delete_account' pk=account.pk %}" class="btn btn-danger">Delete Account</a>
                        <a href="{% url 'view_supplier' %}" class="btn btn-secondary">Back</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
