<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}MyInventorySystem{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { padding-top: 56px; padding-bottom: 56px; }
        .navbar, footer { position: fixed; width: 100%; z-index: 1000; }
        footer { bottom: 0; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav class="navbar navbar-dark bg-dark px-4 top-0">
    <div class="container-fluid d-flex justify-content-between align-items-center">

        <span class="navbar-brand fw-bold mb-0">My Inventory System</span>

        <div class="d-flex align-items-center ms-auto">
            {% block navbar %}
            {% if account %}
                <a href="{% url 'manage_account' pk=account.pk %}" class="btn btn-dark me-2">Manage Account</a>
                <a href="{% url 'logout' %}" class="btn btn-dark">Logout</a>
            {% endif %}
            {% endblock %}
        </div>

    </div>
</nav>

<div class="container mt-4 flex-grow-1">
    {% block content %}{% endblock %}
</div>

<footer class="bg-dark text-white text-center py-3 fixed-bottom w-100 m-0">
    <small>&copy; 2026 MyInventorySystem.</small>
</footer>

</body>
</html>
