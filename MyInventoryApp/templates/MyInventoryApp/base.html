{% load static %}
<!DOCTYPE html>
<html>
<head>
    {% block head %}
    <title>My Inventory System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% endblock %}

    <style>
        .sidebar-link:hover {
            text-decoration: underline !important;
        }
    </style>
</head>
<body>

    {% block header %}
    <nav class="navbar px-4" style="background-color: #860050;">
        <a class="navbar-brand fw-bold text-white" >My Inventory System</a>
    </nav>
    {% endblock %}

    <div class="container-fluid vh-100">
        <div class="row h-100">

            <!-- Sidebar -->
            <div class="col-auto pt-4 px-5">
                <ul class="list-unstyled">
                    <li><a href="{% url 'view_supplier' %}" class="text-decoration-none text-dark d-block py-1 sidebar-link">Suppliers</a></li>
                    <li><a href="{% url 'view_bottles' %}" class="text-decoration-none text-dark d-block py-1 sidebar-link">Water Bottles</a></li>
                    <li><a href="{% url 'add_bottle' %}" class="text-decoration-none text-dark d-block py-1 sidebar-link">Add Bottle</a></li>
            </div>

            <!-- Main Content -->
            <div class="col pt-4 px-5" style="overflow-y: auto; max-height: calc(100vh - 112px);">
                {% block content %}
                {% endblock %}
            </div>

        </div>
    </div>

    <footer class="text-white text-center py-3 mt-3" style="background-color: #5a0000;">
        <p class="mb-0">© 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
