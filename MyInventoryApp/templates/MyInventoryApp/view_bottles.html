<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Water Bottles</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Water Bottles</h2>
        <a href="{% url 'view_supplier' %}" class="btn btn-secondary">Back</a>
    </div>
    <div class="list-group">
        {% for b in bottles %}
            <a href="{% url 'view_bottle_details' pk=b.pk %}" class="list-group-item list-group-item-action">
                {{ b.brand }} — {{ b.size }} — {{ b.color }}
            </a>
        {% empty %}
            <p class="text-muted">No water bottles found.</p>
        {% endfor %}
    </div>
</div>
</body>
</html>
