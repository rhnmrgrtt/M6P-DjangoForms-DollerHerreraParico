{% extends 'MyInventoryApp/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Water Bottles</h2>
    <a href="{% url 'view_supplier' %}" class="btn btn-secondary">Back</a>
</div>

<table class="table table-hover table-bordered bg-white shadow-sm">
    <thead class="table-dark">
        <tr>
            <th>Brand</th>
            <th>SKU</th>
        </tr>
    </thead>
    <tbody>
        {% for b in bottles %}
        <tr onclick='window.location="{% url "view_bottle_details" pk=b.pk %}"'>
            <td>{{ b.brand }}</td>
            <td>{{ b.SKU }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="2" class="text-muted text-center">No water bottles found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
