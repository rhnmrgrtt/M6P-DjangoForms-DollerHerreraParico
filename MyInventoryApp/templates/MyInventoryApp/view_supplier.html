{% extends 'MyInventoryApp/base.html' %}

{% block content %}
<h2 class="mb-4">Suppliers</h2>
<table class="table table-striped table-bordered">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Contact</th>
        </tr>
    </thead>
    <tbody>
        {% for d in suppliers %}
        <tr>
            <td>{{ d.id }}</td>
            <td>{{ d.name }}</td>
            <td>{{ d.country }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="2">No suppliers found.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
