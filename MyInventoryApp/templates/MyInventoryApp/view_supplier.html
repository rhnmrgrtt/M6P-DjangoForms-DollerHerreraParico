{% extends 'MyInventoryApp/base.html' %}

{% block title %}Suppliers{% endblock %}

{% block extra_head %}
<style>
    .card { transition: background-color 0.2s ease; }
    .card:hover { background-color: #e2e6ea; }
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Suppliers</h2>
    <a href="{% url 'add_bottle' %}" class="btn btn-secondary">Add Water Bottle</a>
</div>

<div class="row row-cols-1 row-cols-md-3 g-3">
    {% for s in suppliers %}
    <div class="col">
        <a href="{% url 'view_bottles' pk=s.pk %}" class="text-decoration-none">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">{{ s.name }}</h5>
                    <p class="card-text text-muted">{{ s.city }}, {{ s.country }}</p>
                </div>
            </div>
        </a>
    </div>
    {% empty %}
    <p class="text-muted">No suppliers found.</p>
    {% endfor %}
</div>
{% endblock %}
