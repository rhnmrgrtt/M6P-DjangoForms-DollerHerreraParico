<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Suppliers</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Suppliers</h2>
        <div>
            <a href="{% url 'add_bottle' %}" class="btn btn-success me-2">Add Water Bottle</a>
            {% if account %}
            <a href="{% url 'manage_account' pk=account.pk %}" class="btn btn-secondary me-2">Manage Account</a>
            {% endif %} Account</a>
            <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
        </div>
    </div>
    <div class="list-group">
        {% for s in suppliers %}
            <a href="{% url 'view_bottles' %}" class="list-group-item list-group-item-action">
                {{ s.name }}
            </a>
        {% empty %}
            <p class="text-muted">No suppliers found.</p>
        {% endfor %}
    </div>
</div>
</body>
</html>
